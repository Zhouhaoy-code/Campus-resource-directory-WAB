<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WAB Campus Recovery & Resource Hub</title>
<!-- 引入 Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --p4-yellow: #FDF100;
    --p4-yellow-pale: #FFE54C;
    --p4-orange: #FF9000;
    --p4-cyan: #00BCFF;
    --p4-magenta: #FF0090;
    --p4-dark: #0F0F14;
    --p4-pure: #000000;
    --p4-card: #1C1C24;
    --p4-light: #F2F2F7;
    --p4-gray: #2C2C38;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--p4-dark); color: var(--p4-light); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; min-height: 100vh; }
  .bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .bg-danger-stripes { background: repeating-linear-gradient(45deg, var(--p4-yellow), var(--p4-yellow) 12px, #000 12px, #000 24px); }
  .bg-rainbow-stripes { background: linear-gradient(90deg, #FDF100 0% 20%, #FF9000 20% 40%, #FF0090 40% 60%, #00BCFF 60% 80%, #F7F7FA 80% 100%); }
  .bg-dots { background-image: radial-gradient(rgba(253,241,0,0.15) 12%, transparent 13%); background-size: 14px 14px; }
  .bg-scanlines { background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%); background-size: 100% 4px; }
  .max-w { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
  .top-stripe { height: 16px; border-bottom: 2px solid #000; }
  .hero { display: flex; gap: 1.5rem; margin: 1.5rem 0 2rem; flex-wrap: wrap; }
  .hero-main { flex: 1; min-width: 280px; background: var(--p4-yellow); border: 4px solid #000; padding: 2rem; position: relative; overflow: hidden; clip-path: polygon(0 0, 100% 1.5%, 100% 100%, 0 98.5%); }
  .hero-badge { position: absolute; top: 0; right: 0; background: #000; color: var(--p4-yellow); font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 700; padding: 4px 12px; text-transform: uppercase; letter-spacing: 0.1em; border-left: 2px solid #000; border-bottom: 2px solid #000; }
  .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 6vw, 4rem); color: #000; line-height: 1; text-transform: uppercase; }
  .hero-title span { color: var(--p4-magenta); }
  .hero-rainbow { position: absolute; bottom: 0; left: 0; right: 0; height: 6px; }
  .hero-sidebar { width: 300px; background: var(--p4-gray); border: 4px solid #000; padding: 1.25rem; position: relative; overflow: hidden; clip-path: polygon(0 1.5%, 100% 0, 100% 98.5%, 0 100%); display: flex; flex-direction: column; justify-content: space-between; }
  .status-dot { display: inline-block; width: 8px; height: 8px; background: var(--p4-magenta); border-radius: 50%; animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .quote-box { background: var(--p4-yellow); color: #000; padding: 10px; border: 2px solid #000; cursor: pointer; margin-top: 1rem; font-size: 10px; font-weight: 700; line-height: 1.4; }
  .emergency-card { border: 4px solid #000; background: #0F0F14; padding: 1rem 2rem; position: relative; overflow: hidden; display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; transform: rotate(-1deg); margin: 1rem 0; }
  .emergency-contact { display: flex; align-items: center; gap: 10px; background: #111; border: 2px solid #333; padding: 10px 14px; text-decoration: none; transition: all 0.2s; flex-shrink: 0; }
  .emergency-contact:hover { background: var(--p4-yellow); }
  .ec-label { font-size: 9px; font-family: 'JetBrains Mono',monospace; text-transform: uppercase; color: #666; display: block; }
  .ec-number { font-size: 11px; font-weight: 700; color: #fff; display: block; }
  .ec-dial { background: #1a1a1a; border: 1px solid #333; color: var(--p4-yellow); font-size: 9px; font-weight: 700; padding: 2px 6px; font-family: 'JetBrains Mono',monospace; }
  .tabs { display: flex; gap: 1rem; flex-wrap: wrap; margin: 2rem 0 0; }
  .tab-btn { padding: 1rem 2rem; font-family: 'Bebas Neue',sans-serif; font-size: 1.4rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border: 2px solid #333; background: var(--p4-card); color: #666; flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .tab-btn.active { background: var(--p4-yellow); color: #000; font-weight: 900; border: 4px solid #000; transform: translateY(-4px) rotate(-1deg); filter: drop-shadow(5px 5px 0 #000); }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; margin-top: 2rem; }
  .resource-card { background: var(--p4-card); border: 2px solid #000; position: relative; cursor: pointer; display: flex; flex-direction: column; transition: all 0.2s; }
  .card-header { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px 12px; border-bottom: 2px solid #000; }
  .card-cat-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; font-size: 10px; font-family:'JetBrains Mono',monospace; font-weight: 700; text-transform: uppercase; border: 1px solid #000; }
  .badge-counseling { background: var(--p4-yellow); color: #000; }
  .badge-library { background: var(--p4-orange); color: #fff; }
  .badge-tech { background: var(--p4-cyan); color: #000; }
  .badge-service { background: var(--p4-magenta); color: #fff; }
  .badge-community { background: var(--p4-gray); color: #fff; }
  .card-body { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .card-title { font-family:'Bebas Neue',sans-serif; font-size: 2rem; text-transform: uppercase; line-height: 1; color: #fff; margin-bottom: 6px; }
  .card-footer { background: #000; padding: 8px 12px; text-align: center; border-top: 2px solid #000; font-family:'Bebas Neue',sans-serif; font-size: 1.1rem; color: var(--p4-light); }
  .resource-card:hover .card-footer { background: var(--p4-yellow); color: #000; }
  .lf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
  .lf-card { background: var(--p4-card); border: 2px solid #333; display: flex; flex-direction: column; overflow: hidden; }
  .lf-img-wrap { height: 176px; position: relative; }
  .lf-img { width: 100%; height: 100%; object-fit: cover; }
  .lf-type-badge { position: absolute; top: 0; left: 0; font-family:'Bebas Neue',sans-serif; font-size: 1rem; padding: 4px 14px; color: #000; }
  .lf-body { padding: 1rem; flex: 1; }
  .lf-title { font-family:'Bebas Neue',sans-serif; font-size: 1.5rem; color: #fff; }
  .lf-actions { background: #000; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #222; }
  .btn-reclaim { flex: 1; background: #15803d; color: #fff; border: none; padding: 8px; cursor: pointer; font-family:'Bebas Neue'; }
  .btn-delete { background: transparent; border: 1px solid #333; color: #666; padding: 8px 12px; cursor: pointer; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1rem; overflow-y: auto; }
  .modal { background: #0d0d12; border: 4px solid #000; width: 100%; max-width: 900px; display: flex; flex-wrap: wrap; position: relative; }
  .modal-close { position: absolute; top: 12px; right: 12px; background: var(--p4-yellow); border: 2px solid #000; cursor: pointer; z-index: 10; font-weight: 900; }
  .form-panel { background: var(--p4-card); border: 4px solid #000; padding: 1.5rem; margin-bottom: 1.5rem; }
  .form-input, .form-select, .form-textarea { width: 100%; background: #050508; border: 2px solid #333; color: #fff; padding: 10px; margin-bottom: 1rem; font-family: 'JetBrains Mono'; }
  .success-banner { background: var(--p4-yellow); color: #000; padding: 10px; text-align: center; font-family:'Bebas Neue',sans-serif; border: 2px solid #000; transform: rotate(-1deg); margin-bottom: 1rem; }
</style>
</head>
<body>

<div class="bg-danger-stripes top-stripe"></div>

<div class="max-w" style="padding-top:1.5rem; padding-bottom:5rem;">
  <!-- HERO -->
  <header class="hero">
    <div class="hero-main">
      <div class="hero-badge">★ WAB PORTAL INDEX ★</div>
      <div style="display:flex; align-items:center; gap:1rem;">
        <h1 class="hero-title">WAB CAMPUS <span>RECOVERY</span> HUB</h1>
      </div>
      <p style="font-size:12px; margin-top:1rem;">Welcome to the centralized community directory for the Western Academy of Beijing.</p>
      <div class="hero-rainbow bg-rainbow-stripes"></div>
    </div>
    <div class="hero-sidebar">
      <div style="font-size:10px; color:var(--p4-yellow);">STATUS: <span class="status-dot"></span> ONLINE</div>
      <div class="quote-box" onclick="rotateQuote()">
        <p id="quoteText" style="font-size:10px;"></p>
      </div>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-directory" onclick="switchTab('directory')">★ RESOURCE DIRECTORY ★</button>
    <button class="tab-btn" id="tab-lostfound" onclick="switchTab('lostfound')">☆ LOST & FOUND ☆</button>
  </div>

  <main style="margin-top:2rem;">
    <div id="panel-directory">
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
    
    <div id="panel-lostfound" style="display:none;">
      <div id="successBanner" style="display:none;" class="success-banner"></div>
      <div class="lf-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h2 class="bebas" style="font-size:2rem;">★ WAB High School Bulletins ★</h2>
        <button class="tab-btn" style="max-width:200px;" onclick="toggleForm()">POST NEW ITEM +</button>
      </div>

      <div id="formPanel" style="display:none;" class="form-panel">
        <input type="text" id="fTitle" class="form-input" placeholder="Item Headline" />
        <textarea id="fDesc" class="form-textarea" placeholder="Description"></textarea>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
            <input type="text" id="fName" class="form-input" placeholder="Your Full Name" />
            <input type="text" id="fContact" class="form-input" placeholder="Contact (WeChat/Email)" />
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
            <select id="fLocation" class="form-select">
                <option>Atrium</option><option>Library</option><option>Cafeteria</option><option>Gym</option><option>HS Wing</option>
            </select>
            <select id="fCategory" class="form-select">
                <option>Electronics</option><option>Clothing</option><option>ID Card</option><option>Bottle/Flask</option><option>Other</option>
            </select>
        </div>
        <button class="tab-btn" style="background:var(--p4-yellow); color:#000;" onclick="submitItem()">★ SUBMIT TO BULLETIN ★</button>
      </div>
      
      <div class="lf-grid" id="lfGrid"></div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div id="modal" class="modal-backdrop" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent" style="padding:2.5rem; width:100%;"></div>
  </div>
</div>

<script>
// --- SUPABASE 配置 ---
const SUPABASE_URL = 'https://gepfsidhkaubmeeuunzy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_OFTUMvLWP_js5yuhl4RcJQ_S58eahVD';
// ⚠️ 重要修复：将变量名改为 supabaseClient 避免冲突
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// DATA
const quotes = ['"A diverse campus thrives on collaboration!"', '"Found my calculator in 10 minutes!"', '"The Hub is open until 6 PM."'];
let items = [];

const resources = [
  { id:'res-1', category:'counseling', title:'HS Support & Wellbeing', location:'H214', hours:'08:00 – 16:30', desc:'Confidential guidance and emotional counseling.' },
  { id:'res-2', category:'library', title:'The Hub: Library', location:'Atrium', hours:'07:30 – 18:00', desc:'Research databases and study spaces.' },
  { id:'res-3', category:'tech', title:'TigerTech Support', location:'Ground Floor', hours:'08:00 – 17:00', desc:'MacBook and software troubleshooting.' }
];

// 初始化
window.onload = () => {
  renderCards();
  fetchItems();
  rotateQuote();
};

function rotateQuote() {
  document.getElementById('quoteText').textContent = quotes[Math.floor(Math.random()*quotes.length)];
}

function switchTab(tab) {
  document.getElementById('panel-directory').style.display = tab === 'directory' ? '' : 'none';
  document.getElementById('panel-lostfound').style.display = tab === 'lostfound' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if(tab === 'lostfound') fetchItems();
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = resources.map(r => `
    <div class="resource-card" onclick="openModal('${r.id}')">
      <div class="card-header"><span class="card-cat-badge badge-${r.category}">${r.category}</span></div>
      <div class="card-body">
        <h3 class="card-title">${r.title}</h3>
        <p style="font-size:12px; color:#aaa;">📍 ${r.location} | 🕒 ${r.hours}</p>
      </div>
      <div class="card-footer">★ VIEW RESOURCE ★</div>
    </div>
  `).join('');
}

async function fetchItems() {
  const { data, error } = await supabaseClient.from('items').select('*').order('created_at', { ascending: false });
  if (error) { console.error('Error fetching:', error); return; }
  items = data || [];
  renderLF();
}

async function submitItem() {
  const title = document.getElementById('fTitle').value.trim();
  const name = document.getElementById('fName').value.trim();
  const contact = document.getElementById('fContact').value.trim();
  if(!title || !name) { alert("Title and Name are required!"); return; }

  const newItem = {
    title, studentName: name, contactDetails: contact,
    description: document.getElementById('fDesc').value,
    location: document.getElementById('fLocation').value,
    category: document.getElementById('fCategory').value,
    status: 'active', type: 'lost',
    image: 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400'
  };

  const { error } = await supabaseClient.from('items').insert([newItem]);
  if (!error) {
    toggleForm();
    fetchItems();
    const sb = document.getElementById('successBanner');
    sb.style.display = 'block'; sb.textContent = "★ ITEM POSTED TO CLOUD ★";
    setTimeout(() => sb.style.display = 'none', 4000);
  }
}

function renderLF() {
  const grid = document.getElementById('lfGrid');
  if(!grid) return;
  grid.innerHTML = items.map(item => `
    <div class="lf-card">
      <div class="lf-img-wrap">
        <img class="lf-img" src="${item.image}" />
        <div class="lf-type-badge" style="background:var(--p4-yellow)">LOST</div>
      </div>
      <div class="lf-body">
        <h3 class="lf-title">${item.title}</h3>
        <p style="font-size:12px; color:#888;">Reported by: ${item.studentName}</p>
        <p style="font-size:11px;">📍 ${item.location} | 📂 ${item.category}</p>
      </div>
      <div class="lf-actions">
        <button class="btn-reclaim" onclick="deleteItem('${item.id}')">✕ REMOVE CASE</button>
      </div>
    </div>
  `).join('');
}

async function deleteItem(id) {
  if(confirm("Confirm removal of this bulletin?")) {
    await supabaseClient.from('items').delete().eq('id', id);
    fetchItems();
  }
}

function toggleForm() {
  const p = document.getElementById('formPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

function openModal(id) {
  const r = resources.find(x => x.id === id);
  document.getElementById('modalContent').innerHTML = `
    <h2 class="bebas" style="font-size:3rem; color:var(--p4-yellow);">${r.title}</h2>
    <p style="margin: 1rem 0;">${r.desc}</p>
    <div style="background:#000; padding:1rem; border:1px solid #333;">
        <p><strong>LOCATION:</strong> ${r.location}</p>
        <p><strong>HOURS:</strong> ${r.hours}</p>
    </div>
  `;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
